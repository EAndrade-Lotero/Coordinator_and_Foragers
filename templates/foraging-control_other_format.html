{% macro foraging_area(config) %}

  <style>
    :root { --bg:#0b0f14; --panel:#111826; --text:#e6edf3; --muted:#93a4b5; }
    html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    .wrap {
      height: 100%;
      display: grid;
      grid-template-columns: auto 240px;
      gap: 16px;
      align-items: center;
      justify-content: center;
      padding: 16px;
      box-sizing: border-box;
    }
    canvas {
      background: #000;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,.45);
      border: 1px solid rgba(255,255,255,.08);
    }
    .panel {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,.35);
    }
    .title { display:flex; align-items:center; gap:10px; font-weight: 700; letter-spacing:.2px; margin-bottom: 10px; }
    .gearIcon { font-size: 22px; }
    .hint { color: var(--muted); font-size: 13px; line-height: 1.35; margin: 10px 0 14px; }
    .gearBox {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.08);
    }
    .track {
      width: 10px;
      height: 120px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      position: relative;
      margin: 0 auto;
    }
    .thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255,255,255,.9);
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 6px 16px rgba(0,0,0,.35);
    }
    .gears {
      display: grid;
      gap: 10px;
      font-size: 14px;
    }
    .g {
      display:flex; justify-content: space-between; align-items:center;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.06);
      background: rgba(255,255,255,.02);
    }
    .g.active {
      background: rgba(255,255,255,.10);
      border-color: rgba(255,255,255,.18);
    }
    .badge { color: var(--muted); font-variant-numeric: tabular-nums; }
    .row { margin-top: 14px; font-size: 13px; color: var(--muted); }
    .kbd { display:inline-block; padding: 2px 6px; border-radius: 6px; border: 1px solid rgba(255,255,255,.18); background: rgba(255,255,255,.06); color: var(--text); font-size: 12px; }
  </style>

<body>
  <div class="wrap">
    <canvas id="view" width="440" height="440" aria-label="World viewport"></canvas>

    <aside class="panel">
      <div class="title">Movement Info</div>
      <div class="hint">
        Move with <span class="kbd">W</span><span class="kbd">A</span><span class="kbd">S</span><span class="kbd">D</span>.
        <br>
        <br>
        Change gear with <span class="kbd">↑</span> / <span class="kbd">↓</span>.
      </div>

      <div class="gearBox">
        <div class="track" aria-hidden="true">
          <div id="thumb" class="thumb"></div>
        </div>
        <div class="gears">
          <div id="g3" class="g"><span>Gear 3 (fast)</span><span class="badge" id="b3"></span></div>
          <div id="g2" class="g"><span>Gear 2</span><span class="badge" id="b2"></span></div>
          <div id="g1" class="g"><span>Gear 1 (slow)</span><span class="badge" id="b1"></span></div>
        </div>
      </div>

      <div class="row" id="pos"></div>
    </aside>
  </div>

  <script>
    (() => {
      // ----- World + viewport settings -----
      const WORLD_W = 50, WORLD_H = 50;
      const VIEW = 11;                 // 11x11 view
      const CENTER = Math.floor(VIEW/2); // 5
      const canvas = document.getElementById("cv");
      const ctx = canvas.getContext("2d");

      // Crisp rendering on HiDPI screens
      const cssSize = 440;
      const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
      canvas.style.width = cssSize + "px";
      canvas.style.height = cssSize + "px";
      canvas.width = Math.floor(cssSize * dpr);
      canvas.height = Math.floor(cssSize * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const cell = cssSize / VIEW; // each tile size in CSS pixels

      // ----- Make a simple world (terrain) -----
      // Values: 0=water, 1=grass, 2=sand, 3=rock
      const world = Array.from({ length: WORLD_H }, (_, y) =>
        Array.from({ length: WORLD_W }, (_, x) => {
          // a little structured randomness
          const r = Math.random();
          if (r < 0.10) return 0;
          if (r < 0.70) return 1;
          if (r < 0.88) return 2;
          return 3;
        })
      );

      function tileColor(v) {
        switch (v) {
          case 0: return "#123a5a"; // water
          case 1: return "#1f6d3a"; // grass
          case 2: return "#b79a57"; // sand
          case 3: return "#5b626a"; // rock
          default: return "#000000";
        }
      }

      // ----- Agent position in world coordinates -----
      let ax = Math.floor(WORLD_W / 2);
      let ay = Math.floor(WORLD_H / 2);

      // ----- Gear control (3 speeds) -----
      // Movement is "cells per second" controlled by a per-step interval.
      const gears = [
        { name: "Gear 1", stepMs: 220 },
        { name: "Gear 2", stepMs: 120 },
        { name: "Gear 3", stepMs: 70  }
      ];
      let gearIdx = 1; // start at Gear 2

      const thumb = document.getElementById("thumb");
      const gEls = [document.getElementById("g1"), document.getElementById("g2"), document.getElementById("g3")];
      const bEls = [document.getElementById("b1"), document.getElementById("b2"), document.getElementById("b3")];
      const posEl = document.getElementById("pos");

      function updateGearUI() {
        gEls.forEach((el, i) => el.classList.toggle("active", i === gearIdx));
        bEls[0].textContent = `${gears[0].stepMs} ms/step`;
        bEls[1].textContent = `${gears[1].stepMs} ms/step`;
        bEls[2].textContent = `${gears[2].stepMs} ms/step`;

        // thumb position: top=fast, middle=med, bottom=slow (but intuitive to show 1 bottom, 3 top)
        const yMap = [102, 51, 0]; // px from top inside track (approx)
        thumb.style.top = yMap[gearIdx] + "px";
      }

      // ----- Input handling (WSAD + arrows) -----
      const keys = new Set();

      window.addEventListener("keydown", (e) => {
        const k = e.key.toLowerCase();

        // prevent page scroll on arrows / space
        if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();

        if (k === "w" || k === "a" || k === "s" || k === "d") keys.add(k);

        if (e.key === "ArrowUp") {
          gearIdx = Math.min(2, gearIdx + 1);
          updateGearUI();
        } else if (e.key === "ArrowDown") {
          gearIdx = Math.max(0, gearIdx - 1);
          updateGearUI();
        }
      }, { passive: false });

      window.addEventListener("keyup", (e) => {
        const k = e.key.toLowerCase();
        keys.delete(k);
      });

      // ----- Movement loop with "gear-based" step rate -----
      let lastT = performance.now();
      let acc = 0;

      function stepMoveOnce() {
        let dx = 0, dy = 0;
        if (keys.has("w")) dy -= 1;
        if (keys.has("s")) dy += 1;
        if (keys.has("a")) dx -= 1;
        if (keys.has("d")) dx += 1;

        if (dx === 0 && dy === 0) return;

        // Normalize diagonals so one step per tick (choose dominant axis if both pressed)
        if (dx !== 0 && dy !== 0) {
          // simple tie-break: prefer last pressed? keep deterministic: prefer vertical
          dx = 0;
        }

        ax = Math.max(0, Math.min(WORLD_W - 1, ax + dx));
        ay = Math.max(0, Math.min(WORLD_H - 1, ay + dy));
      }

      // ----- Rendering -----
      function draw() {
        // draw the 11x11 view centered on (ax, ay)
        ctx.clearRect(0, 0, cssSize, cssSize);

        for (let vy = 0; vy < VIEW; vy++) {
          for (let vx = 0; vx < VIEW; vx++) {
            const wx = ax + (vx - CENTER);
            const wy = ay + (vy - CENTER);

            let col = "#0a0d12"; // out-of-bounds
            if (wx >= 0 && wx < WORLD_W && wy >= 0 && wy < WORLD_H) {
              col = tileColor(world[wy][wx]);
            }

            const px = vx * cell;
            const py = vy * cell;

            ctx.fillStyle = col;
            ctx.fillRect(px, py, cell, cell);

            // subtle grid
            ctx.strokeStyle = "rgba(255,255,255,0.08)";
            ctx.strokeRect(px + 0.5, py + 0.5, cell - 1, cell - 1);
          }
        }

        // Agent stays in the middle of the canvas (fixed)
        const cx = (CENTER + 0.5) * cell;
        const cy = (CENTER + 0.5) * cell;

        // agent marker (circle + crosshair)
        ctx.beginPath();
        ctx.arc(cx, cy, cell * 0.22, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(cx - cell * 0.35, cy);
        ctx.lineTo(cx + cell * 0.35, cy);
        ctx.moveTo(cx, cy - cell * 0.35);
        ctx.lineTo(cx, cy + cell * 0.35);
        ctx.strokeStyle = "rgba(0,0,0,0.55)";
        ctx.lineWidth = 2;
        ctx.stroke();

        // Position readout
        posEl.textContent = `World position: (${ax}, ${ay}) • Gear: ${gearIdx + 1}`;
      }

      function loop(t) {
        const dt = t - lastT;
        lastT = t;

        const stepMs = gears[gearIdx].stepMs;
        acc += dt;

        while (acc >= stepMs) {
          stepMoveOnce();
          acc -= stepMs;
        }

        draw();
        requestAnimationFrame(loop);
      }

      updateGearUI();
      draw();
      requestAnimationFrame(loop);
    })();

    /////////////////////////////////////////////////////
    // Function to stage the response for PsyNet
    /////////////////////////////////////////////////////
    psynet.stageResponse = function() {
          psynet.response.staged.rawAnswer = coins_foraged;
    }

    </script>

{% endmacro %}
