{% macro foraging_area(config) %}

  <style>
    :root{
      --cell-size: 28px; /* how big each of the 11x11 cells appears */
      --grid: 11;
      --canvas-size: calc(var(--cell-size) * var(--grid));
    }

    body{
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      background: #0f1115;
      color: #e8ecf1;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    .panel{
      display: grid;
      gap: 14px;
      justify-items: center;
      padding: 18px 22px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
    }

    .viewport{
      position: relative;
      width: var(--canvas-size);
      height: var(--canvas-size);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
      background: #11151c;
    }

    canvas{
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated; /* crisp blocky look */
    }

    /* Center star overlay */
    .star{
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        {#background: rgba(255,255,255,0.08);#}
        background-image: url("{{ config.forager_url }}");
        background-size: cover;
        border: 1px solid rgba(255,255,255,0.18);
        box-shadow:
        0 0 0 6px rgba(255,255,255,0.04),
        0 10px 25px rgba(0,0,0,0.4);
        pointer-events: none; /* don't steal clicks/keys */
    }

    .star span{
      font-size: 22px;
      line-height: 1;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.6));
    }

    .hud{
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 13px;
      opacity: 0.9;
    }

    .badge{
      padding: 4px 8px;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      font-variant-numeric: tabular-nums;
    }

    .hint{
      opacity: 0.75;
      font-size: 12px;
      text-align: center;
      max-width: 38ch;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="viewport" id="viewport">
      <canvas id="view"></canvas>
      <div class="star" aria-hidden="true"></div>
    </div>

    <div class="hud">
      <div class="badge">World: 50×50</div>
      <div class="badge">View: 11×11</div>
      <div class="badge">Cell size: <span id="cellSizeLabel"></span> px</div>
    </div>

    <div class="hud">
      <div class="badge">Center (x, y): <span id="posLabel"></span></div>
    </div>

    <div class="hint">
      Use arrow keys to move inside the terrain. Coins appear as a black square.
    </div>
  </div>

  <script>
        // ----------------------------
        // Config
        // ----------------------------
        let world = {{ config.map }};
        const WORLD_H = world.length;
        const WORLD_W = world[0].length;
        const VIEW_SIZE = 11;            // 11x11
        const HALF = Math.floor(VIEW_SIZE / 2); // 5
        const CELL_SIZE = parseInt(getComputedStyle(document.documentElement)
          .getPropertyValue('--cell-size'), 10);

        // Canvas is drawn at native pixel resolution:
        const canvas = document.getElementById('view');
        const ctx = canvas.getContext('2d', { willReadFrequently: false });

        // Set internal canvas size so each cell is CELL_SIZE pixels.
        canvas.width  = VIEW_SIZE * CELL_SIZE;
        canvas.height = VIEW_SIZE * CELL_SIZE;

        // HUD elements
        const posLabel = document.getElementById('posLabel');
        const cellSizeLabel = document.getElementById('cellSizeLabel');
        cellSizeLabel.textContent = CELL_SIZE.toString();

        // ----------------------------
        // View center position (x, y)
        // Start roughly in the middle
        // ----------------------------
        let x = {{ config.pos_x }};
        let y = {{ config.pos_y }};
        let coins_foraged = [];

        // ----------------------------
        // Helper: safe read with clamp
        // If outside world bounds, clamp to edge.
        // (Alternative: return 0 or wrap-around.)
        // ----------------------------
        function getWorldValue(px, py) {
          const cx = Math.max(0, Math.min(WORLD_W - 1, px));
          const cy = Math.max(0, Math.min(WORLD_H - 1, py));
          return world[cy][cx];
        }

        // ----------------------------
        // Render the 11x11 view centered at (x, y)
        // We'll paint as rectangles per cell for clarity.
        // ----------------------------
        function render() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          for (let j = 0; j < VIEW_SIZE; j++) {
              for (let i = 0; i < VIEW_SIZE; i++) {
                  const worldX = x + (i - HALF);
                  const worldY = y + (j - HALF);
                  const v = getWorldValue(worldX, worldY);

                  // grayscale color
                  ctx.fillStyle = `rgb(${v}, ${v}, ${v})`;
                  ctx.fillRect(i * CELL_SIZE, j * CELL_SIZE, CELL_SIZE, CELL_SIZE);
              }
          }

          // subtle grid lines
          ctx.strokeStyle = "rgba(255,255,255,0.06)";
          ctx.lineWidth = 1;
          for (let i = 0; i <= VIEW_SIZE; i++) {
            const px = i * CELL_SIZE;
            ctx.beginPath();
            ctx.moveTo(px, 0);
            ctx.lineTo(px, canvas.height);
            ctx.stroke();
          }
          for (let j = 0; j <= VIEW_SIZE; j++) {
            const py = j * CELL_SIZE;
            ctx.beginPath();
            ctx.moveTo(0, py);
            ctx.lineTo(canvas.width, py);
            ctx.stroke();
          }

          posLabel.textContent = `(${x}, ${y})`;
        }

        // ----------------------------
        // Movement logic
        // Arrow keys update (x, y),
        // NOT the star icon.
        // ----------------------------
        function move(dx, dy) {
            x = Math.max(0, Math.min(WORLD_W - 1, x + dx));
            y = Math.max(0, Math.min(WORLD_H - 1, y + dy));

            // Check if there is a coin to be foraged
            if (world[y][x] === 0) {
                coins_foraged.push([x, y]);
                {#world[y][x] = Math.floor(Math.random() * 35) + 220;#}
                world[y][x] = 240;
                console.log('Coin collected at position:', x, y);
            }

            console.log('Coins foraged so far:', coins_foraged);

            // Render world
            render();
        }

        window.addEventListener('keydown', (e) => {
          const key = e.key;

          // Prevent page scrolling on arrow keys
          if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(key)) {
            e.preventDefault();
          } else {
            return;
          }

          switch (key) {
            case "ArrowUp":    move(0, -1); break;
            case "ArrowDown":  move(0,  1); break;
            case "ArrowLeft":  move(-1, 0); break;
            case "ArrowRight": move(1,  0); break;
          }
        }, { passive: false });

        // Focus hint: click viewport to "mentally" anchor controls
        document.getElementById('viewport').addEventListener('click', () => {
          // no-op; just gives a natural interaction spot
        });

        // Initial draw
        render();


        /////////////////////////////////////////////////////
        // Function to stage the response for PsyNet
        /////////////////////////////////////////////////////
        psynet.stageResponse = function() {
              psynet.response.staged.rawAnswer = coins_foraged;
        }

    </script>

{% endmacro %}
